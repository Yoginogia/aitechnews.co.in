name: 🤖 AITechNews Daily Article Writer

on:
  schedule:
    # Roz subah 7:00 AM IST = 1:30 AM UTC
    - cron: '30 1 * * *'

  # Manual trigger bhi possible hai
  workflow_dispatch:
    inputs:
      articles_count:
        description: 'Kitne articles likhne hain (1-5)'
        required: false
        default: '3'

jobs:
  write-articles:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write   # GitHub repo mein push karne ke liye

    steps:
      - name: 📥 Repo checkout karo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🐍 Python setup karo
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Dependencies install karo
        run: |
          pip install anthropic feedparser requests

      - name: 🤖 AI Agent run karo
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          MAX_ARTICLES: ${{ github.event.inputs.articles_count || '3' }}
        run: |
          cd scripts
          python news_agent.py

      - name: 📊 Generated articles check karo
        run: |
          echo "=== Naye articles ==="
          ls -la articles/*.json 2>/dev/null | tail -5 || echo "Koi naya article nahi"
          echo ""
          echo "=== Index size ==="
          cat articles/index.json | python3 -c "import sys,json; data=json.load(sys.stdin); print(f'Total articles: {len(data)}')" 2>/dev/null || echo "Index nahi mila"

      - name: 🚀 Changes GitHub pe push karo
        run: |
          git config user.name  "AITechNews Bot 🤖"
          git config user.email "bot@aitechnews.co.in"
          git add articles/
          git diff --staged --quiet || git commit -m "🤖 Auto: $(date '+%d %b %Y') ke articles publish kiye [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Success notification
        if: success()
        run: |
          echo "🎉 Articles successfully publish ho gaye!"
          echo "⏰ Time: $(TZ='Asia/Kolkata' date '+%d %b %Y %I:%M %p IST')"

      - name: ❌ Failure notification
        if: failure()
        run: |
          echo "😢 Agent fail ho gaya — logs check karo"
