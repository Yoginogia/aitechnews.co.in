name: AITechNews Daily Article Writer (Groq - Free)

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:
    inputs:
      articles_count:
        description: 'Kitne articles likhne hain? (1-5)'
        required: false
        default: '3'

jobs:
  write-articles:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dependencies install karo
        run: |
          pip install feedparser requests google-generativeai tweepy

      - name: AI Agent chalao (Gemini & HuggingFace)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          AITECHINDIA_TOKEN: ${{ secrets.AITECHINDIA_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          ARTICLES_COUNT: ${{ github.event.inputs.articles_count || '3' }}
        run: |
          python scripts/publisher.py
