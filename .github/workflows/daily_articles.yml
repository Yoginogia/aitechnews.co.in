name: AITechNews Daily Article Writer (Groq - Free)

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:
    inputs:
      articles_count:
        description: 'Kitne articles likhne hain? (1-5)'
        required: false
        default: '3'

jobs:
  write-articles:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dependencies install karo
        run: |
          pip install feedparser requests

      - name: AI Agent chalao (Groq)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          AITECHINDIA_TOKEN: ${{ secrets.AITECHINDIA_TOKEN }}
          ARTICLES_COUNT: ${{ github.event.inputs.articles_count || '3' }}
        run: |
          python scripts/publisher.py
      
      # ✅ "Articles GitHub pe push karo" वाला स्टेप हटा दिया गया है
      # क्योंकि publisher.py पहले ही API के जरिए पुश कर चुका है।
