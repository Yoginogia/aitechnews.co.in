name: AITechNews Daily Article Writer v3.0

on:
  schedule:
    # 00:00 UTC = 5:30 AM IST - Articles will be live before 7 AM IST
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      category:
        description: 'Specific category chalao (AI/Deals/Software/Crypto/ALL)'
        required: false
        default: 'ALL'

jobs:
  write-articles:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dependencies install karo
        run: |
          pip install feedparser requests tweepy

      - name: AI Agent chalao - Multi-Category Publisher
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          AITECHINDIA_TOKEN: ${{ secrets.AITECHINDIA_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: |
          python scripts/publisher.py > run_logs.txt 2>&1 || true
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add run_logs.txt || true
          git commit -m "Auto: Update logs" || true
          git push || true
